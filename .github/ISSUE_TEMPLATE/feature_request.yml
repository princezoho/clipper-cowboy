name: Feature request
description: Propose an improvement to a Clipper Cowboy workflow
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: workflow
    attributes:
      label: What workflow is blocked or too slow?
      description: Describe the job you are trying to complete and where it breaks down.
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Desired behavior
      description: Explain what you expect Clipper Cowboy to do.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Include current workarounds or other tools you considered.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
