name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            mcp/package-lock.json
      - name: Install app dependencies
        run: npm ci
      - name: Install MCP dependencies
        run: npm --prefix mcp ci
      - name: Audit production dependencies
        run: |
          npm audit --omit=dev
          npm --prefix mcp audit --omit=dev
      - name: Verify app and MCP
        run: npm run verify
      - name: Public-readiness preflight
        run: npm run public:ready
